services:
  vllm-qwen:
    image: vllm/vllm-openai:latest
    container_name: vllm-qwen
    restart: unless-stopped
    ports:
      - "8000:8000"
    gpus: all
    environment:
      HUGGING_FACE_HUB_TOKEN: "${HF_TOKEN:-${HUGGING_FACE_HUB_TOKEN:-}}"
      HF_HOME: /root/.cache/huggingface
      TRANSFORMERS_CACHE: /root/.cache/huggingface
      VLLM_ALLOW_LONG_MAX_MODEL_LEN: "1"
    volumes:
      - ${AI_MODELS_DIR:-${HOME}/.ai/models}:/root/.cache/huggingface
      - ${AI_CACHE_DIR:-${HOME}/.ai/cache}:/root/.cache/vllm
      - ${AI_LOGS_DIR:-${HOME}/.ai/logs}:/var/log/vllm
    shm_size: "2gb"
    ipc: host
    command:
      - Qwen/Qwen3-14B-AWQ
      - --host
      - 0.0.0.0
      - --quantization
      - awq_marlin
      - --port
      - "8000"
      - --dtype
      - auto
      - --gpu-memory-utilization
      - "${VLLM_GPU_MEMORY_UTILIZATION:-0.85}"
      - --enforce-eager
      - --enable-auto-tool-choice
      - --tool-call-parser
      - hermes
      - --max-model-len
      - "${VLLM_MAX_MODEL_LEN:-32768}"
      - --trust-remote-code
